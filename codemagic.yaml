workflows:
  ios-production:
    name: iOS Production → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.yenipc002.Vogel"
        XCODE_WORKSPACE: "ios/Vogel.xcworkspace"
        XCODE_SCHEME: "Vogel"
        APP_STORE_APPLE_ID: "6771534635"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
        EAS_BUILD_NO_EXPO_GO_WARNING: "true"
      node: 20.17.0
      xcode: latest
      cocoapods: default

    # main'e her push'ta otomatik tetiklenir
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Expo prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Set up iOS code signing
        script: |
          set -euo pipefail

          keychain initialize

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:IOS_DIST_PRIVATE_KEY" \
           

          keychain add-certificates

          xcode-project use-profiles

      - name: CocoaPods install
        script: |
          cd ios && pod install --repo-update

      - name: Set build number
        script: |
          cd ios
          LATEST=$(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST + 1))

      - name: Build & sign IPA
        script: |
          WORKSPACE=$(find "$CM_BUILD_DIR/ios" -name "*.xcworkspace" -maxdepth 1 -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - sametrme@gmail.com
        notify:
          success: true
          failure: true
