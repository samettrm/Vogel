workflows:
  ios-production:
    name: iOS Production → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.yenipc002.Vogel"
        APP_STORE_APPLE_ID: "6771534635"
        EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        SENTRY_ORG: "bbb25011e61c"
        SENTRY_PROJECT: "react-native"
        # ─── EXPO_PUBLIC_* env vars (client bundle'a embed olur) ───────────
        # Sentry hata izleme
        EXPO_PUBLIC_SENTRY_DSN: "https://e6e79364db2a2ce1cf617a4874c4de87@o4511445488238592.ingest.de.sentry.io/4511445501476944"
        # RevenueCat IAP
        EXPO_PUBLIC_RC_API_KEY_IOS: "appl_iXakqQdIiyVCKFcEiAdTcXmUHEf"
        # Firebase Auth + Firestore (cihazlar arası senkronizasyon)
        EXPO_PUBLIC_FIREBASE_API_KEY: "AIzaSyDAihK7Xq0-apK0yM6h9LRY9VG0HO-0kdY"
        EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: "vogel-3e071.firebaseapp.com"
        EXPO_PUBLIC_FIREBASE_PROJECT_ID: "vogel-3e071"
        EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: "vogel-3e071.firebasestorage.app"
        EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "701611291838"
        EXPO_PUBLIC_FIREBASE_APP_ID: "1:701611291838:web:a7af502052df142ab45aef"
        # Google Sign-In
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: "701611291838-i5pmtubpad6p68cnidq7jqvkr4s6u5jn.apps.googleusercontent.com"
        EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: "701611291838-pk4iag10ibodcosrk0in98mainvpulta.apps.googleusercontent.com"
      node: 20.17.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Expo prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Set up iOS code signing
        script: |
          set -euo pipefail

          keychain initialize

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:IOS_DIST_PRIVATE_KEY"

          keychain add-certificates

          xcode-project use-profiles

      - name: CocoaPods install
        script: |
          cd ios && pod install --repo-update

      - name: Set build number
        script: |
          cd ios
          LATEST=$(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST + 1))

      - name: Build & sign IPA
        script: |
          WORKSPACE=$(find "$CM_BUILD_DIR/ios" -name "*.xcworkspace" -maxdepth 1 -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)

          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

      email:
        recipients:
          - sametrme@gmail.com
        notify:
          success: true
          failure: true

  android-production:
    name: Android Production → AAB
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      groups:
        - android_credentials  # ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      vars:
        BUNDLE_ID: "com.yenipc002.Vogel"
        EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"  # Android için Sentry source map upload şimdilik kapalı
        # ─── EXPO_PUBLIC_* env vars (client bundle'a embed olur — iOS workflow ile aynı set) ───
        EXPO_PUBLIC_SENTRY_DSN: "https://e6e79364db2a2ce1cf617a4874c4de87@o4511445488238592.ingest.de.sentry.io/4511445501476944"
        # RevenueCat Android API key — android_credentials grubuna EXPO_PUBLIC_RC_API_KEY_ANDROID
        # adıyla secure var olarak ekle (RC dashboard → Project Settings → Android app key 'goog_...')
        EXPO_PUBLIC_FIREBASE_API_KEY: "AIzaSyDAihK7Xq0-apK0yM6h9LRY9VG0HO-0kdY"
        EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: "vogel-3e071.firebaseapp.com"
        EXPO_PUBLIC_FIREBASE_PROJECT_ID: "vogel-3e071"
        EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: "vogel-3e071.firebasestorage.app"
        EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "701611291838"
        EXPO_PUBLIC_FIREBASE_APP_ID: "1:701611291838:web:a7af502052df142ab45aef"
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: "701611291838-i5pmtubpad6p68cnidq7jqvkr4s6u5jn.apps.googleusercontent.com"
      node: 20.17.0
      java: 17

    triggering:
      events: []  # Manuel tetik — push'la otomatik tetiklenmesin (iOS workflow'una karışmasın)

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Expo prebuild Android
        script: npx expo prebuild --platform android --clean

      - name: Decode release keystore
        script: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$CM_BUILD_DIR/android/app/vogel-release.keystore"
          ls -la "$CM_BUILD_DIR/android/app/vogel-release.keystore"

      - name: Configure release signing
        script: |
          set -euo pipefail
          cat >> android/gradle.properties <<EOF

          # Release signing (populated by Codemagic android_credentials group)
          VOGEL_RELEASE_STORE_FILE=vogel-release.keystore
          VOGEL_RELEASE_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          VOGEL_RELEASE_KEY_ALIAS=$ANDROID_KEY_ALIAS
          VOGEL_RELEASE_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          EOF

      - name: Patch build.gradle for release signing
        script: |
          set -euo pipefail
          bash scripts/patch-android-signing.sh

      - name: Build AAB
        script: |
          set -euo pipefail
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - sametrme@gmail.com
        notify:
          success: true
          failure: true
      # TODO: Play Console service account JSON hazırlanınca buraya google_play publishing ekle:
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true