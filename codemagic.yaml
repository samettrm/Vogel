workflows:
  ios-production:
    name: iOS Production → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.yenipc002.Vogel"
        APP_STORE_APPLE_ID: "6771534635"
        EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        SENTRY_ORG: "bbb25011e61c"
        SENTRY_PROJECT: "react-native"
        # ─── EXPO_PUBLIC_* env vars (client bundle'a embed olur) ───────────
        # Sentry hata izleme
        EXPO_PUBLIC_SENTRY_DSN: "https://e6e79364db2a2ce1cf617a4874c4de87@o4511445488238592.ingest.de.sentry.io/4511445501476944"
        # RevenueCat IAP
        EXPO_PUBLIC_RC_API_KEY_IOS: "appl_iXakqQdIiyVCKFcEiAdTcXmUHEf"
        # Firebase Auth + Firestore (cihazlar arası senkronizasyon)
        EXPO_PUBLIC_FIREBASE_API_KEY: "AIzaSyDAihK7Xq0-apK0yM6h9LRY9VG0HO-0kdY"
        EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: "vogel-3e071.firebaseapp.com"
        EXPO_PUBLIC_FIREBASE_PROJECT_ID: "vogel-3e071"
        EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: "vogel-3e071.firebasestorage.app"
        EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "701611291838"
        EXPO_PUBLIC_FIREBASE_APP_ID: "1:701611291838:web:a7af502052df142ab45aef"
        # Google Sign-In
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: "701611291838-i5pmtubpad6p68cnidq7jqvkr4s6u5jn.apps.googleusercontent.com"
        EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: "701611291838-pk4iag10ibodcosrk0in98mainvpulta.apps.googleusercontent.com"
      node: 20.17.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Expo prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Set up iOS code signing
        script: |
          set -euo pipefail

          keychain initialize

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:IOS_DIST_PRIVATE_KEY"

          keychain add-certificates

          xcode-project use-profiles

      - name: CocoaPods install
        script: |
          cd ios && pod install --repo-update

      - name: Set build number
        script: |
          cd ios
          LATEST=$(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST + 1))

      - name: Build & sign IPA
        script: |
          WORKSPACE=$(find "$CM_BUILD_DIR/ios" -name "*.xcworkspace" -maxdepth 1 -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)

          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

      email:
        recipients:
          - sametrme@gmail.com
        notify:
          success: true
          failure: true